name: build RustDeskTempTopMostWindow

on:
  workflow_call:
    inputs:
        upload-artifact:
          type: boolean
          default: true
        target:
            description: 'Target'
            required: true
            type: string
            default: 'windows-2022'
        configuration:
            description: 'Configuration'
            required: true
            type: string
            default: 'Release'
        platform:
            description: 'Platform'
            required: true
            type: string
            default: 'x64'
        target_version:
            description: 'TargetVersion'
            required: true
            type: string
            default: 'Windows10'

env:
  project_path: WindowInjection/WindowInjection.vcxproj

  # This values are normally passed from the rdgen server via an encrypted zip

  androidappid: "it.mynet.aiuto"
  apiServer: "rustdesk.mynet.it:21114"
  appname: "MyNet Assistenza Tecnica"
  compname: "MyNet"
  downloadLink: "https://aiuto.mynet.it/"
  filename: "mynet-assistenza-tecnica"
  key: "Qy3s10jVjXij5rmbRArE4bAyRCrlDAx8WX+UdIwMiCw="
  server: "rustdesk.mynet.it"
  urlLink: "https://aiuto.mynet.it/"

  # Logo
  iconlink_url: "https://raw.githubusercontent.com/mynetit/rustdesk-client-generator/master/img/logo.png"
  logolink_url: "https://raw.githubusercontent.com/mynetit/rustdesk-client-generator/master/img/logo.png"
  privacylink_url: "false"

  # Features
  delayFix: "true"
  rdgen: "true"
  cycleMonitor: "true"
  xOffline: "false"
  removeNewVersionNotif: "true"
  custom: ""


jobs:
  build-RustDeskTempTopMostWindow:
    runs-on: ${{ inputs.target }}
    strategy:
        fail-fast: false
    env:
      build_output_dir: RustDeskTempTopMostWindow/WindowInjection/${{ inputs.platform }}/${{ inputs.configuration }}
    steps:
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download the source code
        run: |
          git clone https://github.com/rustdesk-org/RustDeskTempTopMostWindow RustDeskTempTopMostWindow

        # Build. commit 53b548a5398624f7149a382000397993542ad796 is tag v0.3
      - name: Build the project
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 1
          max_attempts: 3
          shell: pwsh
          command: |
            cd RustDeskTempTopMostWindow && git checkout 53b548a5398624f7149a382000397993542ad796
            if ($env:privacylink_url -ne "false") {
              Invoke-WebRequest -Uri ${{ env.privacylink_url }} -OutFile privacy.png
              Invoke-WebRequest -Uri https://raw.githubusercontent.com/bryangerlach/rdgen/refs/heads/master/.github/patches/privacyScreen.py -OutFile privacyScreen.py
              python privacyScreen.py
              rm ./WindowInjection/img.cpp
              mv img.cpp ./WindowInjection/img.cpp
            }
            msbuild ${{ env.project_path }} -p:Configuration=${{ inputs.configuration }} -p:Platform=${{ inputs.platform }} /p:TargetVersion=${{ inputs.target_version }}

      - name: Archive build artifacts
        uses: actions/upload-artifact@master
        if: ${{ inputs.upload-artifact }}
        with:
            name: topmostwindow-artifacts
            path: |
              ./${{ env.build_output_dir }}/WindowInjection.dll
